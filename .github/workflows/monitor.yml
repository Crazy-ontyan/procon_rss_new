name: 高専プロコン監視ボット
on:
  schedule:
    - cron: "*/5 * * * *" # 5分ごと
  workflow_dispatch: # 手動テスト用

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate webhook secret
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "ERROR: GitHub Secret 'DISCORD_WEBHOOK' が未設定です"
            exit 1
          fi

      - name: Run procon checker
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: python procon_checker.py
