name: 高専プロコン監視ボット
on:
  schedule:
    - cron: "*/5 * * * *" # 5分ごと
  workflow_dispatch: # 手動テスト用

permissions:
  contents: write

jobs:
  monitor:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate webhook secret
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          if [ -z "$WEBHOOK_URL" ]; then
            echo "ERROR: GitHub Secret 'DISCORD_WEBHOOK' が未設定です"
            exit 1
          fi

      - name: Run procon checker
        env:
          WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK }}
        run: python procon_checker.py

      - name: Persist notice state
        run: |
          if [ -n "$(git status --porcelain -- last_notice.json)" ]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add last_notice.json
            git commit -m "chore: update last notice state [skip ci]"
            git push
          else
            echo "State file has no changes"
          fi
